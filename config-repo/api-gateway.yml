spring:
  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 5s

      routes:
        # 1. Zone Service
        - id: zone-service
          uri: lb://ZONE-SERVICE
          predicates:
            - Path=/api/v1/zones/**
          filters:
            - AuthenticationFilter

        # 2. Crop Service
        - id: crop-service
          uri: lb://CROP-SERVICE
          predicates:
            - Path=/api/v1/crops/**
          filters:
            - AuthenticationFilter

        # 3. Sensor Service
        - id: sensor-service
          uri: lb://SENSOR-SERVICE
          predicates:
            - Path=/api/v1/sensors/**
          filters:
            - AuthenticationFilter

        # 4. Automation Service
        - id: automation-service
          uri: lb://AUTOMATION-SERVICE
          predicates:
            - Path=/api/v1/automation/**
          filters:
            - AuthenticationFilter

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**

jwt:
  secret: ${JWT_SECRET_KEY}